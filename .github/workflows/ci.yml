name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
    
    - name: Run Black (formatting check)
      run: black --check src/ scripts/ tests/
      
    - name: Run isort (import sorting check)
      run: isort --check-only src/ scripts/ tests/
      
    - name: Run Flake8 (linting)
      run: flake8 src/ scripts/ tests/ --max-line-length=100 --extend-ignore=E203,W503

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install PyTorch
      run: |
        pip install torch==2.1.0 torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
    
    - name: Install PyTorch Geometric
      run: |
        pip install torch-geometric==2.4.0
        pip install torch-scatter torch-sparse torch-cluster -f https://data.pyg.org/whl/torch-2.1.0+cpu.html
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  test-gpu:
    name: GPU Tests (if available)
    runs-on: ubuntu-latest
    # Only run on main branch to save resources
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check for GPU
      run: |
        nvidia-smi || echo "No GPU available"
    
    # GPU tests would go here
    # Commented out as GitHub Actions doesn't provide GPUs by default
    # For GPU testing, use self-hosted runners or cloud CI services

  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Check documentation links
      run: |
        pip install markdown-link-check || true
        # Check README
        python -c "import markdown; markdown.markdown(open('README.md').read())"
    
    - name: Validate YAML configs
      run: |
        pip install pyyaml
        python -c "import yaml; [yaml.safe_load(open(f)) for f in ['configs/base_config.yaml']]"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install safety
      run: pip install safety
    
    - name: Run safety check
      run: safety check --file requirements.txt || true
      # Continue on error as some vulnerabilities may be in dev dependencies

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    # Only run on PRs to main
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install torch==2.1.0 --index-url https://download.pytorch.org/whl/cpu
        pip install torch-geometric==2.4.0
        pip install -r requirements.txt
    
    - name: Run integration tests
      run: |
        # Test that imports work
        python -c "from src.models.promptgfm import PromptGFM"
        python -c "from src.data.dataset import BiomedicalGraphDataset"
        echo "Integration tests passed!"

  # Optional: Docker build test
  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    # Only run on main branch
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    # Uncomment when Dockerfile is ready
    # - name: Build Docker image
    #   run: docker build -t promptgfm-bio:test .
