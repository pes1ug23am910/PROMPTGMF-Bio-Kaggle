# Kaggle Configuration for PromptGFM-Bio
# ─────────────────────────────────────────────────────────────────────────────
# Tuned for Kaggle T4 x1  (16 GB VRAM) or P100 (16 GB VRAM)
# Compared to laptop (RTX 4060, 8 GB):
#   - batch_size doubled  (16 GB → can fit 2× more)
#   - gradient_accumulation halved (same effective batch size)
#   - hidden_dim increased for better capacity
#   - mixed_precision kept on (T4/P100 both support FP16)
#   - num_workers reduced (Kaggle CPUs are limited)
#   - wandb disabled by default (login manually in the notebook if desired)
# ─────────────────────────────────────────────────────────────────────────────

# Model Configuration
model:
  name: 'promptgfm_film'

  use_prompt: true

  prompt_encoder:
    model_name: 'microsoft/BiomedNLP-PubMedBERT-base-uncased-abstract-fulltext'
    pooling_strategy: 'cls'
    max_length: 512
    freeze_encoder: false

  # GNN Backbone — larger hidden_dim thanks to 16 GB VRAM
  gnn_type: 'graphsage'           # Options: 'graphsage', 'gat', 'gin'
  hidden_dim: 512                 # ↑ 256→512 (was 256 on laptop config)
  num_layers: 3
  dropout: 0.3

  # Conditioning
  conditioning_type: 'film'
  prompt_dim: 768

  # Node features
  gene_feature_dim: 128
  disease_feature_dim: 128
  phenotype_feature_dim: 128

  # Prediction head
  prediction_hidden_dim: 256      # ↑ 128→256

# Training Configuration
training:
  optimizer: 'adamw'
  learning_rate: 0.0005
  weight_decay: 0.01
  betas: [0.9, 0.999]

  num_epochs: 100
  batch_size: 64                  # ↑ 32→64 (T4/P100 have 2× VRAM)
  gradient_clip: 1.0
  accumulation_steps: 1           # ↓ 2→1 (batch_size already doubled; effective = 64)

  loss_type: 'combined'
  loss_weights:
    bce: 1.0
    ranking: 0.5
    listnet: 0.3
  margin: 0.5

  early_stopping_patience: 15
  min_delta: 0.0001

  lr_scheduler: 'cosine'
  lr_warmup_epochs: 5
  lr_min: 1e-6

  # Checkpoint every epoch (important for 9-h session limit)
  save_best: true
  save_last: true
  save_interval: 1               # Every epoch — recover from session timeout
  checkpoint_dir: 'checkpoints/promptgfm_film'

  pretrained_checkpoint: null

# Data Configuration
data:
  graph_file: 'data/processed/biomedical_graph.pt'
  edge_file: 'data/processed/hpo_gene_disease_edges.csv'
  min_score: 0.3

  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  random_seed: 42

  num_negatives: 5
  negative_sampling_strategy: 'random'

  use_disease_descriptions: true
  use_phenotype_lists: true
  max_phenotypes_per_disease: 20

  num_workers: 2                  # ↓ 4→2  (Kaggle CPU quota is limited)
  pin_memory: true
  prefetch_factor: 2

# Evaluation Configuration
evaluation:
  metrics:
    - 'auroc'
    - 'aupr'
    - 'precision_at_k'
    - 'recall_at_k'
    - 'map'
    - 'mrr'
    - 'ndcg_at_k'
    - 'hit_rate_at_k'
  k_values: [10, 20, 50, 100]
  stratify_by_rarity: true
  rarity_thresholds:
    ultra_rare: 2
    very_rare: 5
    rare: 15
    common: 1000
  few_shot_k: [1, 3, 5, 10]
  evaluate_on:
    - 'val'
    - 'test'

# Case Studies
case_studies:
  enabled: true
  studies:
    - name: 'angelman'
      known_genes: ['UBE3A']
    - name: 'rett'
      known_genes: ['MECP2']
    - name: 'fragile_x'
      known_genes: ['FMR1']

# Logging — disable W&B by default; set use_wandb: true + call wandb.login() in notebook
logging:
  use_wandb: false
  wandb_project: 'promptgfm-bio'
  wandb_run_name: 'kaggle_t4_run'
  wandb_entity: null
  wandb_tags:
    - 'promptgfm'
    - 'film'
    - 'kaggle'
    - 'rare-disease'
  log_interval: 20               # Less frequent logging (Kaggle stdout is slower)
  log_gradients: false           # Saves memory / time
  log_model_architecture: true

# Hardware
hardware:
  device: 'cuda'
  mixed_precision: true          # FP16 — works on T4 and P100
  gpu_memory_fraction: 0.92      # Leave ~8% for PyG scatter operations

# Reproducibility
seed: 42
deterministic: false             # deterministic=True is slow; disable on Kaggle
benchmark: true                  # Faster when graph sizes are fixed
